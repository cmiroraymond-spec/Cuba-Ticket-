name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Make Gradlew executable
      run: chmod +x android/gradlew
    
    - name: Generate Cuba-themed Icons
      run: |
        sudo apt-get update && sudo apt-get install -y imagemagick
        mkdir -p android/app/src/main/res/mipmap-{ldpi,mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
        
        convert -size 192x192 xc:'#002395' \
                -fill '#CE1126' -draw 'rectangle 0,0 192,96' \
                -fill 'white' -draw 'polygon 96,0 96,192 110,192 110,0' \
                -fill 'white' -pointsize 50 -gravity center \
                -annotate +0-30 'CUBA' \
                -fill '#FFD700' -pointsize 40 \
                -annotate +0+30 'TICKET' /tmp/cuba_icon.png
        
        convert /tmp/cuba_icon.png -resize 36x36 android/app/src/main/res/mipmap-ldpi/ic_launcher.png
        convert /tmp/cuba_icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert /tmp/cuba_icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert /tmp/cuba_icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert /tmp/cuba_icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert /tmp/cuba_icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
    
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: android/app/build/outputs/apk/release/app-release.apk
        tag_name: v1.0.0
        name: 🇨🇺 Cuba Ticket v1.0.0
        body: |
          🎉 Cuba Ticket APK Release
          ✅ Web: https://cuba-ticket.free.nf
          📱 Android 5.0+ (API 21+)
          🇨🇺 Tema: Bandera Cubana
